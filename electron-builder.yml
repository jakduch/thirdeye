appId: com.thirdeye-git.app
productName: ThirdEye

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*

mac:
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  icon: assets/icon.png
  category: public.app-category.developer-tools
  darkModeSupport: true

dmg:
  title: ThirdEye
  artifactName: ThirdEye-${version}-mac-universal.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  artifactName: ThirdEye-${version}-win-setup.${ext}

linux:
  target:
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: AppImage
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: Development
  maintainer: Jakub Duch
  executableName: thirdeye
  synopsis: Multi-provider Git repository monitoring desktop app
  description: Monitor your GitHub, GitLab & Bitbucket PRs, issues, notifications, and CI checks from your desktop.

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
  artifactName: ThirdEye-${version}-linux-${arch}.${ext}

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-core
    - libuuid
    - libsecret
  artifactName: ThirdEye-${version}-linux-${arch}.${ext}

appImage:
  artifactName: ThirdEye-${version}-linux-${arch}.${ext}

publish:
  provider: github
  owner: jakduch
  repo: thirdeye
